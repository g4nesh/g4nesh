<svg xmlns="http://www.w3.org/2000/svg" width="720" height="124" viewBox="0 0 720 124" role="img" aria-label="ascii plasma animation">
  <style>
    .bg { fill: #06070c; }
    .ascii {
      font: 11px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      letter-spacing: 1px;
      white-space: pre;
      dominant-baseline: text-before-edge;
    }
    .hot {
      fill: #d946ef;
      opacity: .62;
      animation: drift-left 8s linear infinite, breathe 3.4s ease-in-out infinite;
    }
    .cool {
      fill: #38bdf8;
      opacity: .24;
      animation: drift-right 11s linear infinite;
    }
    .spark {
      fill: #f0abfc;
      opacity: .42;
      animation: shimmer 2.8s steps(2, end) infinite;
    }
    .veil { fill: url(#veil); }
    @keyframes drift-left {
      from { transform: translateX(0); }
      to { transform: translateX(-108px); }
    }
    @keyframes drift-right {
      from { transform: translateX(-92px); }
      to { transform: translateX(0); }
    }
    @keyframes breathe {
      0%, 100% { opacity: .50; }
      50% { opacity: .72; }
    }
    @keyframes shimmer {
      0%, 100% { opacity: .25; }
      50% { opacity: .58; }
    }
    @media (prefers-reduced-motion: reduce) {
      .hot, .cool, .spark { animation: none; }
    }
  </style>
  <defs>
    <linearGradient id="veil" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#06070c" stop-opacity=".50"/>
      <stop offset=".28" stop-color="#06070c" stop-opacity=".14"/>
      <stop offset=".66" stop-color="#06070c" stop-opacity=".06"/>
      <stop offset="1" stop-color="#06070c" stop-opacity=".44"/>
    </linearGradient>
    <clipPath id="clip">
      <rect width="720" height="124" rx="7"/>
    </clipPath>
  </defs>
  <rect class="bg" width="720" height="124" rx="7"/>
  <g clip-path="url(#clip)">
    <g class="ascii hot">
      <text x="-28" y="10">::::---===+++***###%%%%###***+++===---::::---===+++***###%%%%###***+++===---::::---===+++***###%%%%###***+++===---</text>
      <text x="-16" y="24">::---===+++**###%%@@%%###**+++===---::::---===+++**###%%@@%%###**+++===---::::---===+++**###%%@@%%###**+++===---</text>
      <text x="-40" y="38">---===+++***###%%%%###***+++===---::::---===+++***###%%%%###***+++===---::::---===+++***###%%%%###***+++===---::</text>
      <text x="-22" y="52">===+++***###%%%###***+++===---::::---===+++***###%%%###***+++===---::::---===+++***###%%%###***+++===---::::---</text>
      <text x="-34" y="66">+++***###%%%%###***+++===---::::---===+++***###%%%%###***+++===---::::---===+++***###%%%%###***+++===---::::---=</text>
      <text x="-10" y="80">**###%%@@%%###**+++===---::::---===+++**###%%@@%%###**+++===---::::---===+++**###%%@@%%###**+++===---::::---===</text>
      <text x="-44" y="94">###%%%%###***+++===---::::---===+++***###%%%%###***+++===---::::---===+++***###%%%%###***+++===---::::---===+++</text>
      <text x="-26" y="108">%%###***+++===---::::---===+++***###%%%###***+++===---::::---===+++***###%%%###***+++===---::::---===+++***###</text>
    </g>
    <g class="ascii cool">
      <text x="-86" y="16">....::::----====++++====----::::....::::----====++++====----::::....::::----====++++====----::::....::::----====</text>
      <text x="-102" y="32">..::::---===++****++===---::::..::::---===++****++===---::::..::::---===++****++===---::::..::::---===++****++=</text>
      <text x="-76" y="48">::::---==++**##**++==---::::---==++**##**++==---::::---==++**##**++==---::::---==++**##**++==---::::---==++**</text>
      <text x="-96" y="64">---===++**####**++===---::::---===++**####**++===---::::---===++**####**++===---::::---===++**####**++===---::</text>
      <text x="-70" y="80">==++**##%%##**++==---::::---==++**##%%##**++==---::::---==++**##%%##**++==---::::---==++**##%%##**++==---::::</text>
      <text x="-88" y="96">++**##%%%%##**++==---::::---==++**##%%%%##**++==---::::---==++**##%%%%##**++==---::::---==++**##%%%%##**++==</text>
    </g>
    <g class="ascii spark">
      <text x="32" y="13">        *     +        .        *       +        .        *       +        .        *       +</text>
      <text x="88" y="43">   +         .       *       +       .       *       +       .       *       +       .</text>
      <text x="18" y="73">      .       *        +        .       *        +        .       *        +        .</text>
      <text x="122" y="103"> *        +       .        *       +        .       *       +        .       *</text>
    </g>
    <rect class="veil" width="720" height="124"/>
  </g>
</svg>
