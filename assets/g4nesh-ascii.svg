<svg xmlns="http://www.w3.org/2000/svg" width="960" height="150" viewBox="0 0 960 150" role="img" aria-label="ascii plasma animation">
  <style>
    .bg { fill: #05060b; }
    .glyphs {
      font: 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      letter-spacing: .35px;
      white-space: pre;
      dominant-baseline: text-before-edge;
    }
    .field { mask: url(#glyph-mask); }
    .b1 { animation: b1 7.2s ease-in-out infinite alternate; }
    .b2 { animation: b2 8.8s ease-in-out infinite alternate; }
    .b3 { animation: b3 10.4s ease-in-out infinite alternate; }
    .b4 { animation: b4 6.6s ease-in-out infinite alternate; }
    .wash { animation: wash 9.5s linear infinite; }
    @keyframes b1 {
      from { transform: translate(-60px, -8px) scale(1); }
      to { transform: translate(180px, 36px) scale(1.12); }
    }
    @keyframes b2 {
      from { transform: translate(120px, 28px) scale(1.05); }
      to { transform: translate(-130px, -18px) scale(.96); }
    }
    @keyframes b3 {
      from { transform: translate(-90px, 42px) scale(.94); }
      to { transform: translate(130px, -28px) scale(1.08); }
    }
    @keyframes b4 {
      from { transform: translate(40px, -34px) scale(.98); }
      to { transform: translate(-150px, 26px) scale(1.1); }
    }
    @keyframes wash {
      from { transform: translateX(-520px); }
      to { transform: translateX(520px); }
    }
    @media (prefers-reduced-motion: reduce) {
      .b1, .b2, .b3, .b4, .wash { animation: none; }
    }
  </style>
  <defs>
    <filter id="soft" x="-20%" y="-80%" width="140%" height="260%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <radialGradient id="magenta" cx="50%" cy="50%" r="55%">
      <stop offset="0" stop-color="#f0abfc"/>
      <stop offset=".34" stop-color="#d946ef"/>
      <stop offset="1" stop-color="#4c1d95" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cyan" cx="50%" cy="50%" r="58%">
      <stop offset="0" stop-color="#67e8f9"/>
      <stop offset=".36" stop-color="#0891b2"/>
      <stop offset="1" stop-color="#0e7490" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="violet" cx="50%" cy="50%" r="60%">
      <stop offset="0" stop-color="#c084fc"/>
      <stop offset=".38" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#312e81" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="base" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#7e22ce"/>
      <stop offset=".24" stop-color="#d946ef"/>
      <stop offset=".48" stop-color="#8b5cf6"/>
      <stop offset=".72" stop-color="#06b6d4"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="sweep" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#05060b" stop-opacity="0"/>
      <stop offset=".18" stop-color="#22d3ee" stop-opacity=".42"/>
      <stop offset=".46" stop-color="#e879f9" stop-opacity=".86"/>
      <stop offset=".72" stop-color="#8b5cf6" stop-opacity=".48"/>
      <stop offset="1" stop-color="#05060b" stop-opacity="0"/>
    </linearGradient>
    <mask id="glyph-mask" maskUnits="userSpaceOnUse">
      <rect width="960" height="150" fill="black"/>
      <g class="glyphs" fill="white">
        <text x="10" y="6">@@@@@@@@@@@@@@@@%%%%%%%#####******++++++++==================+++++++++++++++++++++++++++++++++++=++++++++++++++******######%%%%%%%@@@@@</text>
        <text x="10" y="17">@@@@@@@@@%%%%%%%#####*****++++++===========================++++++++++++++++++++++++++++++++++++++++===++++++++++++******#####%%%%%%@@@</text>
        <text x="10" y="28">%%###########********+++++++++====================+++++++++********######################**********+++++++++++++++++++++++*******#####</text>
        <text x="10" y="39">*************++++++++++++++++=======================++++++++********#############################*********++++++++++++========++++++++</text>
        <text x="10" y="50">++++++++++++++++++++++++=========------------------------=======++++++++*******************************++++++++++++=============------</text>
        <text x="10" y="61">=====++++++++++++++=======-----::::::::........::::::::------=======++++++++++++++++++++====================================----------</text>
        <text x="10" y="72">====++++++++++++++======-----::::::::....::::::::----=====+++++*****************+++++======-------------------------============------</text>
        <text x="10" y="83">=++++++++*****++++++++=====--------:::--------====++++****#######%%%%%%%%%######****++++====------::::::::---------===================</text>
        <text x="10" y="94">++*******########*******+++++================+++++****######%%%%%%%%%%%%%%%%####****++++=====-----------------=======+++++++++++++++++</text>
        <text x="10" y="105">****#####%%%%%%%%%%%%######******++++++++++++++++++********###############*******++++++======================++++++++*****************</text>
        <text x="10" y="116">***#####%%%%%%%%%@@%%%%%%%%%%######*******+++++++++++++++++++++**********+++++++++++++++++++++++++++++++++++++****************########</text>
        <text x="10" y="127">****########%%%%%%%%%%%%%%%%%#########************++++++++++***************************************++++++++++++**********************#</text>
      </g>
    </mask>
  </defs>
  <rect class="bg" width="960" height="150" rx="8"/>
  <g class="field">
    <rect width="960" height="150" fill="url(#base)" opacity=".62"/>
    <g filter="url(#soft)">
      <circle class="b1" cx="190" cy="30" r="150" fill="url(#magenta)" opacity=".95"/>
      <circle class="b2" cx="720" cy="86" r="170" fill="url(#cyan)" opacity=".85"/>
      <circle class="b3" cx="465" cy="115" r="190" fill="url(#violet)" opacity=".92"/>
      <circle class="b4" cx="930" cy="20" r="145" fill="url(#magenta)" opacity=".74"/>
    </g>
    <rect class="wash" x="-420" y="0" width="840" height="150" fill="url(#sweep)" opacity=".72"/>
  </g>
</svg>
