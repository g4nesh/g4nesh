<svg xmlns="http://www.w3.org/2000/svg" width="720" height="124" viewBox="0 0 720 124" role="img" aria-label="g4nesh ascii plasma banner">
  <style>
    .bg { fill: #06070c; }
    .frame { fill: none; stroke: #242938; stroke-width: 1; }
    .ascii {
      font: 11px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      letter-spacing: 1px;
      white-space: pre;
      dominant-baseline: text-before-edge;
    }
    .hot {
      fill: #d946ef;
      opacity: .62;
      animation: drift-left 8s linear infinite, breathe 3.4s ease-in-out infinite;
    }
    .cool {
      fill: #38bdf8;
      opacity: .24;
      animation: drift-right 11s linear infinite;
    }
    .spark {
      fill: #f0abfc;
      opacity: .42;
      animation: shimmer 2.8s steps(2, end) infinite;
    }
    .veil { fill: url(#veil); }
    .tag { fill: rgba(6, 7, 12, .72); stroke: rgba(148, 163, 184, .22); stroke-width: 1; }
    .prompt { fill: #a78bfa; font: 700 15px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .name { fill: #f8fafc; font: 800 34px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; letter-spacing: 1.5px; }
    .sub { fill: #94a3b8; font: 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .cursor { fill: #c084fc; animation: blink 1.1s steps(1, end) infinite; }
    @keyframes drift-left {
      from { transform: translateX(0); }
      to { transform: translateX(-108px); }
    }
    @keyframes drift-right {
      from { transform: translateX(-92px); }
      to { transform: translateX(0); }
    }
    @keyframes breathe {
      0%, 100% { opacity: .50; }
      50% { opacity: .72; }
    }
    @keyframes shimmer {
      0%, 100% { opacity: .25; }
      50% { opacity: .58; }
    }
    @keyframes blink {
      50% { opacity: 0; }
    }
    @media (prefers-reduced-motion: reduce) {
      .hot, .cool, .spark, .cursor { animation: none; }
    }
  </style>
  <defs>
    <linearGradient id="veil" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#06070c" stop-opacity=".96"/>
      <stop offset=".32" stop-color="#06070c" stop-opacity=".58"/>
      <stop offset=".62" stop-color="#06070c" stop-opacity=".14"/>
      <stop offset="1" stop-color="#06070c" stop-opacity=".78"/>
    </linearGradient>
    <clipPath id="clip">
      <rect x="1" y="1" width="718" height="122" rx="8"/>
    </clipPath>
  </defs>
  <rect class="bg" width="720" height="124" rx="8"/>
  <g clip-path="url(#clip)">
    <g class="ascii hot">
